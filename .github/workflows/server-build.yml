name: Build Server Bundle

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watch=false

      - name: Build optional server variant
        run: npm run build:server

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-server-build
          path: dist/angular2
          if-no-files-found: error
